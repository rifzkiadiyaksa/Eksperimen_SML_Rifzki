name: 1. Preprocessing Workflow

on:
  push:
    branches:
      - main
    paths:
      - 'survey_lung_cancer_raw.csv'
      - 'preprocessing/automate_Rifzki.py'
      - '.github/workflows/preprocessing.yml'

jobs:
  preprocess-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib

      # Menjalankan skrip dari root direktori
      - name: Run preprocessing script
        run: python preprocessing/automate_Rifzki.py

      # Commit dan push hasil preprocessing dari folder preprocessing
      - name: Commit and push preprocessed files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add preprocessing/
          git commit -m "Automated preprocessing by GitHub Actions" || echo "No changes to commit"
          git push