name: Data Preprocessing

on:
  push:
    paths:
      - 'survey_lung_cancer_raw.csv'
      - 'preprocessing/automate_Rifzki.py'
      - '.github/workflows/preprocessing.yml'

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn joblib # Menambahkan scikit-learn dan joblib

    - name: Run preprocessing script
      run: |
        # Menjalankan skrip dengan argumen input dan output
        python preprocessing/automate_Rifzki.py survey_lung_cancer_raw.csv preprocessing/lung_cancer_clean.csv

    - name: Upload preprocessed dataset as artifact
      uses: actions/upload-artifact@v4
      with:
        name: clean-dataset
        path: preprocessing/lung_cancer_clean.csv